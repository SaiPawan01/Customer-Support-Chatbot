services:
  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: chatbot-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_NAME: chatbot
      DB_USER: postgres
      DB_PASSWORD: 12345678
      DB_HOST: db
      REDIS_LOCATION: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: chatbot-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
