name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install coverage
          pip install -r requirements.txt

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: backend.settings
        run: |
          coverage run --source=accounts,chatbot,documents manage.py test accounts.test_app chatbot.test_app documents.test_app accounts.tests chatbot.tests
          coverage xml -o coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        with:
          args: >-
            -Dsonar.projectKey=SaiPawan01_Customer-Support-Chatbot
            -Dsonar.organization=saipawan01
            -Dsonar.projectBaseDir=backend
            -Dsonar.sources=.
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/tests.py,**/test_app.py
            -Dsonar.exclusions=**/migrations/**,**/__pycache__/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}