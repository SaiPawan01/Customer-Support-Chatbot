<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./dist/chatbot-widget.css">
</head>
<body>
    <script src="./dist/chatbot-widget.js"></script>
    <script>
      if (!globalThis.ChatbotWidget || typeof globalThis.ChatbotWidget.init !== "function") {
        console.error("ChatbotWidget did not load correctly.");
      } else {
        globalThis.ChatbotWidget.init({
          apiUrl: "http://localhost:8000/api/chat/",
          clientId: "test123",
          theme: {
            background: '#000000'
          }
        });
      }
    </script>
</body>
</html>
